<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR Counter</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --text: #f2f2f2;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --border: #2a2e37;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 3rem;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    max-width: 360px;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0 0 0.25rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #count {
    font-size: 4rem;
    font-weight: 700;
    margin: 0.5rem 0 1.5rem;
    line-height: 1;
  }
  button {
    font-size: 1rem;
    font-weight: 600;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    margin: 0 0.25rem;
    transition: background 0.15s ease;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: var(--border); }
  p.hint {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 1.25rem;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>PRs Shipped</h1>
    <div id="count">0</div>
    <button id="increment">Ship a PR 🚀</button>
    <button id="reset" class="secondary">Reset</button>
    <p class="hint">Counter is saved locally in your browser.</p>
    <p class="hint"><a href="trading.html">Crypto &amp; stocks dashboard &rarr;</a></p>
  </div>

  <script>
    const countEl = document.getElementById('count');
    const key = 'prCount';

    function render() {
      countEl.textContent = localStorage.getItem(key) || '0';
    }

    document.getElementById('increment').addEventListener('click', () => {
      const next = (parseInt(localStorage.getItem(key) || '0', 10) + 1);
      localStorage.setItem(key, next);
      render();
    });

    document.getElementById('reset').addEventListener('click', () => {
      localStorage.setItem(key, '0');
      render();
    });

    render();
  </script>
</body>
</html>
